name: Frontend Deploy

on:
  push:
    branches: [main]

  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.UI_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            export PATH="$HOME/.bun/bin:$PATH"

            echo "=== Pulling latest code ==="
            cd ~/lila-ui
            git pull --ff-only

            echo "=== Installing dependencies ==="
            bun install

            echo "=== Building with production env ==="
            export VITE_NAKAMA_HOST="${{ secrets.NAKAMA_HOST }}"
            export VITE_NAKAMA_PORT="${{ secrets.NAKAMA_PORT }}"
            export VITE_NAKAMA_SERVER_KEY="${{ secrets.NAKAMA_SERVER_KEY }}"
            export VITE_NAKAMA_USE_SSL="${{ secrets.NAKAMA_USE_SSL }}"
            bun run build

            echo "=== Deploying to nginx ==="
            sudo rm -rf /var/www/lila-ui/dist
            sudo cp -r dist /var/www/lila-ui/
            sudo chown -R nginx:nginx /var/www/lila-ui
            sudo systemctl reload nginx

            echo "=== Verifying ==="
            if curl -sf http://127.0.0.1/ > /dev/null 2>&1; then
              echo "✅ Frontend is serving"
            else
              echo "❌ Frontend not responding"
              exit 1
            fi
