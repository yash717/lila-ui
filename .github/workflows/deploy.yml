name: Frontend Deploy

on:
  push:
    branches: [main]

  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.UI_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            echo "=== Logging into GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "=== Pulling latest code ==="
            cd ~/lila-ui
            git fetch origin main
            git reset --hard origin/main
            
            # Save the currently running image SHA before updating (for rollback)
            PREV_IMAGE=$(docker inspect --format='{{.Config.Image}}' nebula_ui_prod 2>/dev/null || echo "ghcr.io/yash717/lila-ui:latest")
            PREV_TAG=${PREV_IMAGE##*:}

            export IMAGE_TAG=${{ github.sha }}

            # Stop host nginx to free up port 80 if it is running
            if systemctl is-active --quiet nginx; then
                echo "Stopping host nginx..."
                sudo systemctl stop nginx
                sudo systemctl disable nginx
            fi

            echo "=== Pulling Image ($IMAGE_TAG) ==="
            docker compose pull

            echo "=== Deploying ==="
            docker compose up -d

            echo "=== Health Check (30s wait) ==="
            RETRY=0
            HEALTHY=false
            while [ $RETRY -lt 15 ]; do
              if curl -sf http://127.0.0.1/ > /dev/null 2>&1; then
                HEALTHY=true
                break
              fi
              echo "Waiting... ($RETRY/15)"
              sleep 2
              RETRY=$((RETRY+1))
            done

            if [ "$HEALTHY" = true ]; then
              echo "✅ Frontend is healthy! Deploy successful."
            else
              echo "❌ Frontend failed health check! Triggering ROLLBACK."
              docker compose logs --tail=50 ui
              
              echo "=== Rolling Back to $PREV_TAG ==="
              export IMAGE_TAG=$PREV_TAG
              docker compose up -d
              
              echo "✅ Rollback applied. Exiting with failure."
              exit 1
            fi
