name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript check
        run: bun run lint

      - name: ESLint
        run: bunx eslint 'src/**/*.{ts,tsx}'

      - name: Prettier check
        run: bun run format:check
        continue-on-error: true

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_NAKAMA_HOST=${{ secrets.NAKAMA_HOST }}
            VITE_NAKAMA_PORT=${{ secrets.NAKAMA_PORT }}
            VITE_NAKAMA_SERVER_KEY=${{ secrets.NAKAMA_SERVER_KEY }}
            VITE_NAKAMA_USE_SSL=${{ secrets.NAKAMA_USE_SSL }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest

  deploy:
    name: Deploy to EC2
    needs: lint-and-build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.UI_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            if ! command -v docker &> /dev/null; then
                echo "=== Installing Docker ==="
                sudo apt-get update
                sudo apt-get install -y docker.io docker-compose-v2
            fi

            echo "=== Logging into GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "=== Pulling latest code ==="
            cd ~/lila-ui
            git fetch origin main
            git reset --hard origin/main
            
            # Save the currently running image SHA before updating (for rollback)
            PREV_IMAGE=$(sudo docker inspect --format='{{.Config.Image}}' nebula_ui_prod 2>/dev/null || echo "ghcr.io/yash717/lila-ui:latest")
            PREV_TAG=${PREV_IMAGE##*:}

            export IMAGE_TAG=${{ github.sha }}

            # Stop host nginx to free up port 80 if it is running
            if systemctl is-active --quiet nginx; then
                echo "Stopping host nginx..."
                sudo systemctl stop nginx
                sudo systemctl disable nginx
            fi

            echo "=== Pulling Image ($IMAGE_TAG) ==="
            sudo -E docker compose pull

            echo "=== Deploying ==="
            sudo -E docker compose up -d

            echo "=== Health Check (30s wait) ==="
            RETRY=0
            HEALTHY=false
            while [ $RETRY -lt 15 ]; do
              if curl -sf http://127.0.0.1/ > /dev/null 2>&1; then
                HEALTHY=true
                break
              fi
              echo "Waiting... ($RETRY/15)"
              sleep 2
              RETRY=$((RETRY+1))
            done

            if [ "$HEALTHY" = true ]; then
              echo "✅ Frontend is healthy! Deploy successful."
            else
              echo "❌ Frontend failed health check! Triggering ROLLBACK."
              sudo -E docker compose logs --tail=50 ui
              
              echo "=== Rolling Back to $PREV_TAG ==="
              export IMAGE_TAG=$PREV_TAG
              sudo -E docker compose up -d
              
              echo "✅ Rollback applied. Exiting with failure."
              exit 1
            fi
