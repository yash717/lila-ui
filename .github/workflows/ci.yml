name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript check
        run: bun run lint

      - name: ESLint
        run: bunx eslint 'src/**/*.{ts,tsx}'

      - name: Prettier check
        run: bun run format:check
        continue-on-error: true

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_NAKAMA_HOST=${{ secrets.NAKAMA_HOST }}
            VITE_NAKAMA_PORT=${{ secrets.NAKAMA_PORT }}
            VITE_NAKAMA_SERVER_KEY=${{ secrets.NAKAMA_SERVER_KEY }}
            VITE_NAKAMA_USE_SSL=${{ secrets.NAKAMA_USE_SSL }}
          tags: |
            ghcr.io/${{ github.repository }}-ui:${{ github.sha }}
            ghcr.io/${{ github.repository }}-ui:latest
