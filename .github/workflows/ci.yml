name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript check
        run: bun run lint

      - name: ESLint
        run: bunx eslint 'src/**/*.{ts,tsx}'

      - name: Prettier check
        run: bun run format:check
        continue-on-error: true

      - name: Build
        run: bun run build
        env:
          # Dummy values so Vite build doesn't fail on missing env
          VITE_NAKAMA_HOST: "localhost"
          VITE_NAKAMA_PORT: "7350"
          VITE_NAKAMA_SERVER_KEY: "ci-test-key"
          VITE_NAKAMA_USE_SSL: "false"

      - name: Docker build
        run: docker build -t nebula-strike:ci .
